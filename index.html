<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ultra Coin Clicker</title>

<style>

body{
background:#1e1e2f;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#money{
font-size:35px;
margin:20px;
}

#coin{
width:150px;
cursor:pointer;
transition:0.1s;
}

#coin:active{
transform:scale(0.9);
}

.shop{
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#ad{
margin-top:40px;
background:#111;
padding:15px;
}

#ad img{
width:300px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>💰 Ultra Coin Clicker</h1>

<div id="money">Para: 0</div>

<img id="coin" src="https://cdn-icons-png.flaticon.com/512/138/138292.png" onclick="clickCoin()">

<div class="shop">

<h2>Mağaza</h2>

<button onclick="buyClick()">Tıklama Gücü +1 (50)</button>

<button onclick="buyAuto()">Otomatik Kazanç (100)</button>

</div>

<div id="ad">

<h3>Reklam</h3>

<img src="https://via.placeholder.com/300x100?text=REKLAM">

</div>

<script>

let money = 0
let clickPower = 1
let auto = 0

function clickCoin(){

money = money + clickPower

update()

}

function buyClick(){

if(money >= 50){
money = money - 50
clickPower = clickPower + 1
}

update()

}

function buyAuto(){

if(money >= 100){
money = money - 100
auto = auto + 1
}

update()

}

function update(){

document.getElementById("money").innerText = "Para: " + money

}

setInterval(function(){

money = money + auto
update()

},1000)

</script>

</body>
</html>
